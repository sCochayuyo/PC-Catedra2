[tool.black]
line-length = 100
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
)/
'''

[tool.isort]
profile = "black"
known_first_party = ["gamescout"]
force_sort_within_sections = true
line_length = 100

[[tool.mypy.overrides]]
module = [
    "plotly",
    "plotly.*",
]
ignore_missing_imports = true